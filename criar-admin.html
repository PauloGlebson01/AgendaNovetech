<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Administrador | Novetech</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="shortcut icon" href="asstes/9Tech.icon" type="image/x-icon">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="brand">
                <i class="fas fa-user-shield" style="color: #8b5cf6; background: #ede9fe;"></i>
                <h2>Criar <span>Administrador</span></h2>
                <p>Crie o primeiro administrador do sistema Novetech</p>
            </div>

            <div style="margin-bottom: 20px; padding: 12px; background: #fef3c7; border-radius: 8px; border: 1px solid #fcd34d; text-align: center;">
                <i class="fas fa-info-circle" style="color: #d97706;"></i>
                <span style="color: #92400e; font-size: 14px;">
                    Este processo cria o <strong>primeiro administrador</strong> do sistema.
                </span>
            </div>

            <form id="adminForm" autocomplete="off" onsubmit="return false;">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="nome" placeholder="Nome completo *" autocomplete="off" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="E-mail *" autocomplete="off" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="senha" placeholder="Senha (mínimo 6 caracteres) *" autocomplete="new-password" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" id="senhaConfirm" placeholder="Confirmar senha *" autocomplete="new-password" required>
                </div>
                
                <button class="btn-primary" id="btnCriar" type="button" style="background: linear-gradient(135deg, #8b5cf6, #7c3aed);">
                    <i class="fas fa-user-shield"></i> Criar Administrador
                </button>
            </form>

            <div id="status" style="margin-top: 16px; display: none;"></div>

            <div class="login-footer">
                <a href="index.html">
                    <i class="fas fa-arrow-left"></i> Voltar para o Login
                </a>
                <span style="margin: 0 8px; color: #e2e8f0;">|</span>
                <a href="agenda-publica.html">
                    <i class="fas fa-eye"></i> Ver agenda pública
                </a>
            </div>

            <!-- Footer -->
            <footer class="app-footer">
                <div class="footer-divider"></div>
                <div class="footer-content">
                    <div class="footer-brand">
                        <img src="asstes/9Tech-perfil.jpg" alt="Novetech Soluções Tecnológicas" class="footer-logo">
                    </div>
                    <p class="footer-text">
                        &copy; 2026 Novetech Soluções Tecnológicas - Todos os direitos reservados.
                    </p>
                    <div class="footer-links">
                        <a href="#"><i class="fas fa-envelope"></i> www.novetech.com.br</a>
                        <a href="#"><i class="fas fa-phone"></i> (83) 3225-1422</a>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const btnCriar = document.getElementById('btnCriar');
            const statusDiv = document.getElementById('status');
            
            // ==================== VERIFICAR LIMITE DE ADMINISTRADORES ====================
            async function verificarLimiteAdmin() {
                try {
                    const snapshot = await db.collection('usuarios')
                        .where('tipo', '==', 'admin')
                        .get();
                    return snapshot.size;
                } catch (error) {
                    console.error("❌ Erro ao verificar limite:", error);
                    return -1;
                }
            }

            // ==================== ATUALIZAR ESTADO DO BOTÃO ====================
            async function atualizarEstadoBotao() {
                const total = await verificarLimiteAdmin();
                if (total >= 2) {
                    btnCriar.disabled = true;
                    btnCriar.style.opacity = '0.5';
                    btnCriar.style.cursor = 'not-allowed';
                    btnCriar.title = 'Limite de administradores atingido';
                } else {
                    btnCriar.disabled = false;
                    btnCriar.style.opacity = '1';
                    btnCriar.style.cursor = 'pointer';
                    btnCriar.title = '';
                }
                return total;
            }

            // ==================== EXECUTAR VERIFICAÇÃO INICIAL ====================
            setTimeout(atualizarEstadoBotao, 500);

            // ==================== CLICK DO BOTÃO ====================
            btnCriar.addEventListener('click', async function() {
                const nome = document.getElementById('nome').value.trim();
                const email = document.getElementById('email').value.trim();
                const senha = document.getElementById('senha').value;
                const senhaConfirm = document.getElementById('senhaConfirm').value;
                
                // Reset status
                statusDiv.style.display = 'none';
                statusDiv.className = '';
                
                // Validações
                if (!nome || !email || !senha || !senhaConfirm) {
                    statusDiv.style.display = 'block';
                    statusDiv.className = 'status-error';
                    statusDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Preencha todos os campos!';
                    return;
                }
                
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    statusDiv.style.display = 'block';
                    statusDiv.className = 'status-error';
                    statusDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Por favor, insira um e-mail válido.';
                    return;
                }
                
                if (senha.length < 6) {
                    statusDiv.style.display = 'block';
                    statusDiv.className = 'status-error';
                    statusDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> A senha deve ter pelo menos 6 caracteres!';
                    return;
                }
                
                if (senha !== senhaConfirm) {
                    statusDiv.style.display = 'block';
                    statusDiv.className = 'status-error';
                    statusDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> As senhas não coincidem!';
                    return;
                }
                
                const btn = this;
                const textoOriginal = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verificando...';
                
                try {
                    // 🔥 VERIFICAR LIMITE DE ADMINISTRADORES
                    const totalAdmins = await verificarLimiteAdmin();
                    
                    if (totalAdmins >= 2) {
                        statusDiv.style.display = 'block';
                        statusDiv.className = 'status-warning';
                        statusDiv.innerHTML = `
                            <i class="fas fa-exclamation-triangle"></i> 
                            <strong>Limite de administradores atingido!</strong><br>
                            <span style="font-size: 13px;">
                                O sistema permite no máximo <strong>2</strong> administradores. 
                                Já existem ${totalAdmins} administradores cadastrados.
                            </span>
                            <br><br>
                            <a href="index.html" style="color: #2563eb; font-weight: 600;">Ir para o Login →</a>
                        `;
                        btn.disabled = false;
                        btn.innerHTML = textoOriginal;
                        atualizarEstadoBotao();
                        return;
                    }

                    // ==================== CONTINUAR COM A CRIAÇÃO ====================
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Criando administrador...';
                    
                    // Criar usuário no Authentication
                    const userCred = await auth.createUserWithEmailAndPassword(email, senha);
                    const uid = userCred.user.uid;
                    
                    // Salvar como administrador no Firestore
                    await db.collection('usuarios').doc(uid).set({
                        uid: uid,
                        nome: nome,
                        email: email,
                        tipo: 'admin',
                        aprovado: true,
                        criadoEm: firebase.firestore.FieldValue.serverTimestamp(),
                        criadoPor: 'sistema'
                    });
                    
                    // Também criar registro na coleção de solicitações como aprovado
                    await db.collection('solicitacoesCadastro').doc(uid).set({
                        uid: uid,
                        nome: nome,
                        email: email,
                        status: 'aprovado',
                        criadoEm: firebase.firestore.FieldValue.serverTimestamp(),
                        aprovadoEm: firebase.firestore.FieldValue.serverTimestamp(),
                        aprovadoPor: 'sistema'
                    });
                    
                    statusDiv.style.display = 'block';
                    statusDiv.className = 'status-success';
                    statusDiv.innerHTML = `
                        <i class="fas fa-check-circle"></i> 
                        <strong>Administrador criado com sucesso!</strong><br><br>
                        <div style="background: #f8fafc; padding: 12px; border-radius: 8px; text-align: left; font-size: 14px;">
                            <div><strong>📧 E-mail:</strong> ${email}</div>
                            <div><strong>👤 Nome:</strong> ${nome}</div>
                            <div><strong>🔑 Senha:</strong> ${senha}</div>
                        </div>
                        <br>
                        <a href="index.html" class="btn-primary" style="display: inline-block; text-decoration: none; width: auto; padding: 12px 40px;">
                            <i class="fas fa-sign-in-alt"></i> Fazer Login
                        </a>
                    `;
                    
                    btn.innerHTML = '<i class="fas fa-check"></i> Criado com sucesso!';
                    btn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
                    
                    // Limpar campos
                    document.getElementById('nome').value = '';
                    document.getElementById('email').value = '';
                    document.getElementById('senha').value = '';
                    document.getElementById('senhaConfirm').value = '';
                    
                    // Atualizar estado do botão
                    atualizarEstadoBotao();
                    
                } catch (error) {
                    console.error('❌ Erro:', error);
                    statusDiv.style.display = 'block';
                    statusDiv.className = 'status-error';
                    
                    if (error.code === 'auth/email-already-in-use') {
                        statusDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Este e-mail já está em uso. Tente outro e-mail.';
                    } else if (error.code === 'auth/weak-password') {
                        statusDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> A senha é muito fraca. Use pelo menos 6 caracteres com letras e números.';
                    } else if (error.code === 'auth/network-request-failed') {
                        statusDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Erro de rede. Verifique sua conexão com a internet.';
                    } else if (error.message && error.message.includes('Missing or insufficient permissions')) {
                        statusDiv.innerHTML = `
                            <i class="fas fa-exclamation-circle"></i> 
                            Erro de permissão no banco de dados.<br><br>
                            <span style="font-size: 13px;">Verifique as regras de segurança do Firestore no Firebase Console.</span>
                            <br><br>
                            <button onclick="window.location.reload()" style="padding: 8px 20px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer;">
                                <i class="fas fa-redo"></i> Tentar novamente
                            </button>
                        `;
                    } else {
                        statusDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> Erro ao criar administrador: ${error.message}`;
                    }
                    
                    btn.disabled = false;
                    btn.innerHTML = textoOriginal;
                }
            });
        });
    </script>

    <style>
        .status-success {
            background: #d1fae5;
            color: #059669;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #a7f3d0;
            text-align: center;
        }
        .status-error {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #fecaca;
            text-align: center;
        }
        .status-warning {
            background: #fef3c7;
            color: #d97706;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #fcd34d;
            text-align: center;
        }
        .status-success i, .status-error i, .status-warning i {
            font-size: 20px;
            margin-right: 8px;
        }
        .btn-primary {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
            box-shadow: 0 4px 12px rgba(37,99,235,0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(37,99,235,0.4);
        }
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        #status {
            display: none;
            margin-top: 16px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-footer a {
            color: #2563eb;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .login-footer a:hover {
            color: #1e40af;
            text-decoration: underline;
        }
        .app-footer {
            margin-top: 30px;
            padding-top: 16px;
            width: 100%;
        }
        .footer-divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(to right, transparent, #e2e8f0, transparent);
            margin-bottom: 16px;
        }
        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 0 8px;
        }
        .footer-logo {
            height: 32px;
            width: auto;
            max-width: 180px;
            object-fit: contain;
            display: block;
        }
        .footer-text {
            color: #94a3b8;
            font-size: 12px;
            margin: 0;
            text-align: center;
            line-height: 1.4;
        }
        .footer-links {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .footer-links a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 11px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .footer-links a:hover {
            color: #3b82f6;
        }
        .footer-links a i {
            font-size: 11px;
        }
        @media (max-width: 480px) {
            .footer-content {
                gap: 6px;
            }
            .footer-text {
                font-size: 10px;
            }
            .footer-links {
                gap: 12px;
            }
            .footer-links a {
                font-size: 10px;
            }
            .footer-logo {
                height: 28px;
                max-width: 150px;
            }
        }
    </style>
</body>
</html>
